<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test mountSplashAnimation()</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: #0b0b0c;
      }

      #container {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <script type="module">
      import { mountSplashAnimation } from "./splash-animation/mount-splash-animation.js";

      const container = document.getElementById("container");
      mountSplashAnimation(container, { showUI: true, timeScale: 0.5 });
    </script>
  </body>
</html>
