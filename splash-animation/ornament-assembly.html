    // -------------------------

    function createScene() {
      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x0b0b0c, 10, 30);
      return scene;
    }

    function createRenderer() {
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);
      return renderer;
    }

    function createCamera() {
      const camera = new THREE.PerspectiveCamera(
        55,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.set(0, 0.6, 10);
      return camera;
    }

    function addSceneLights(scene) {
      const ambientLight = new THREE.AmbientLight(0xffffff, 2);
      scene.add(ambientLight);

      const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
      keyLight.position.set(3, 5, 6);
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(0xffffff, 0.55);
      rimLight.position.set(-4, 2, -6);
      scene.add(rimLight);
    }

    function exposeDebugGlobals({ scene, camera, assemblyGroup }) {
      window.scene = scene;
      window.camera = camera;
      window.assemblyGroup = assemblyGroup;
    }

    // -------------------------
    // Material / texture helpers
    // -------------------------

    function loadTexture(path) {
      const texture = new THREE.TextureLoader().load(path);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function configureOrnamentTexture(texture) {
      const imageScale = 1 / (2 * ornamentRadius);
      texture.offset.set(0.5, 0.5);
      texture.repeat.set(imageScale, imageScale);
      return texture;
    }

    function configureCapTexture(texture) {
      texture.offset.set(0.5, 0.5);
      texture.repeat.set(1 / ornamentRadius, 1 / ornamentRadius);
      return texture;
    }

    function makePaperMaterial() {
      return new THREE.MeshStandardMaterial({
        color: 0xfaf7f0,
        roughness: 0.9,
        metalness: 0.0,
        transparent: true
      });
    }

    function makeTexturedFaceMaterial(texture) {
      return new THREE.MeshBasicMaterial({
        map: texture,
      });
    }

    function makeInvisibleCapMaterial() {
      return new THREE.MeshBasicMaterial({
        transparent: true,
        opacity: 0
      });
    }

    function makeOrnamentEdgeMaterial() {
      return new THREE.MeshBasicMaterial({
        color: 0xffffff,
      });
    }

    function makeBumpMaterial() {
      return new THREE.MeshStandardMaterial({
        color: 0xd9d9d9,
        roughness: 0.85,
        metalness: 0.2,
      });
    }

    function makeCapMaterial(texture) {
      return new THREE.MeshStandardMaterial({
        map: texture,
        roughness: 0.85,
        metalness: 0.0
      });
    }


    // -------------------------
    // Geometry / mesh helpers
    // -------------------------
    function roundedRectPath(x, y, w, h, r) {
      // returns a THREE.Shape path (not closed automatically)
      const s = new THREE.Shape();
      s.moveTo(x + r, y);
      s.lineTo(x + w - r, y);
      s.quadraticCurveTo(x + w, y, x + w, y + r);
      s.lineTo(x + w, y + h - r);
      s.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      s.lineTo(x + r, y + h);
      s.quadraticCurveTo(x, y + h, x, y + h - r);
      s.lineTo(x, y + r);
      s.quadraticCurveTo(x, y, x + r, y);
      return s;
    }

    function makeOrnamentShape() {
      // Main circle at (0,0) radius R
      const shape = new THREE.Shape();
      shape.absarc(0, 0, ornamentRadius, 0, Math.PI * 2, false);

      // Bump parameters
      const bumpW = 0.6 * ornamentRadius;
      const bumpH = 0.8 * ornamentRadius;
      const bumpRad = 0.2 * ornamentRadius;
      const overlap = 0.4 * ornamentRadius;

      const bx = -bumpW / 2;
      const by = (ornamentRadius - overlap); // bottom of bump overlaps the circle slightly

      const bump = roundedRectPath(bx, by, bumpW, bumpH, bumpRad);

      // Union by adding as a "hole"? Not correct.
      // Instead: append bump contour to main shape (same fill area).
      // Three.js Shape supports multiple subpaths by using shape.holes for subtraction,
      // but for union we can just add bump as a separate shape and extrude both in a group.
      // We'll return both shapes and merge visually by stacking in same mesh via ShapeGeometry is tricky.
      // For v1 visual: create one combined Shape by tracing circle + bump as a single contour is complex.
      // Practical approach: extrude circle and bump as a single geometry via ShapeUtils isn't built-in union.
      // So: build ornament as a Group of two extrusions that look fused.

      return { circleShape: shape, bumpShape: bump };
    }

    function extrudeShape(shape, depth = 0.06) {
      const geo = new THREE.ExtrudeGeometry(shape, {
        depth,
        bevelEnabled: false,
        curveSegments: 64,
        steps: 1
      });
      // Center in Z around 0 (so it rotates like a "coin" around its midplane)
      geo.translate(0, 0, -depth / 2);
      return geo;
    }

    function lineFromShape(shape) {
      const pts = shape.getPoints(128);
      const geo = new THREE.BufferGeometry().setFromPoints(pts.map(p => new THREE.Vector3(p.x, p.y, 0.001)));
      return new THREE.LineLoop(geo, outlineMat.clone());
    }




    function makeFaceGroups({ circleGeo, bumpGeo, matA, matB, matBump, paperThickness }) {
      const frontCircleMesh = new THREE.Mesh(circleGeo, matA);
      const backCircleMesh = new THREE.Mesh(circleGeo, matB);
      const frontBumpMesh = new THREE.Mesh(bumpGeo, matBump);
      const backBumpMesh = new THREE.Mesh(bumpGeo, matBump);

      frontBumpMesh.position.z -= 0.01 * paperThickness;
      backBumpMesh.position.z -= 0.01 * paperThickness;

      const frontGroup = new THREE.Group();
      const backGroup = new THREE.Group();

      frontGroup.add(frontCircleMesh);
      frontGroup.add(frontBumpMesh);

      backGroup.add(backCircleMesh);
      backGroup.add(backBumpMesh);

      frontGroup.position.z += paperThickness / 2;
      backGroup.rotation.y = Math.PI;
      backGroup.position.z += -paperThickness / 2;

      return { frontGroup, backGroup };
    }

    function makeEdgeMesh(shape, paperThickness, matCapsInvisible, edgeMaterial) {
      const sideGeo = extrudeShape(shape, paperThickness);
      return new THREE.Mesh(sideGeo, [matCapsInvisible, edgeMaterial]);
    }

    // -------------------------
    // Piece builders
    // -------------------------

    function createOrnamentPiece({
      frontTexture,
      backTexture,
      ornamentRadius,
      thickness
    }) {
      function configureFaceTexture(texture) {
        const imageScale = 1 / (2 * ornamentRadius);
        texture.offset.set(0.5, 0.5);
        texture.repeat.set(imageScale, imageScale);
        return texture;
      }

      function createPieceMaterials() {
        const configuredFrontTexture = configureFaceTexture(frontTexture);
        const configuredBackTexture = configureFaceTexture(backTexture);

        return {
          frontFaceMaterial: makeTexturedFaceMaterial(configuredFrontTexture),
          backFaceMaterial: makeTexturedFaceMaterial(configuredBackTexture),
          hiddenCapMaterial: makeInvisibleCapMaterial(),
          edgeMaterial: makeOrnamentEdgeMaterial(),
          bumpMaterial: makeBumpMaterial()
        };
      }

      function createPieceShapes() {
        return makeOrnamentShape();
      }

      function createPieceFaceGroups({ circleShape, bumpShape, materials }) {
        const circleGeometry = new THREE.ShapeGeometry(circleShape, 64);
        const bumpGeometry = new THREE.ShapeGeometry(bumpShape, 64);

        return makeFaceGroups({
          circleGeo: circleGeometry,
          bumpGeo: bumpGeometry,
          matA: materials.frontFaceMaterial,
          matB: materials.backFaceMaterial,
          matBump: materials.bumpMaterial,
          paperThickness: thickness
        });
      }

      function createPieceEdgeMeshes({ circleShape, bumpShape, materials }) {
        return {
          circleEdgeMesh: makeEdgeMesh(
            circleShape,
            thickness,
            materials.hiddenCapMaterial,
            materials.edgeMaterial
          ),
          bumpEdgeMesh: makeEdgeMesh(
            bumpShape,
            thickness,
            materials.hiddenCapMaterial,
            materials.bumpMaterial
          )
        };
      }

      const materials = createPieceMaterials();
      const { circleShape, bumpShape } = createPieceShapes();
      const { frontGroup, backGroup } = createPieceFaceGroups({
        circleShape,
        bumpShape,
        materials
      });
      const { circleEdgeMesh, bumpEdgeMesh } = createPieceEdgeMeshes({
        circleShape,
        bumpShape,
        materials
      });

      const group = new THREE.Group();
      group.add(frontGroup);
      group.add(backGroup);
      group.add(circleEdgeMesh);
      group.add(bumpEdgeMesh);

      return {
        group,
        circleShape,
        bumpShape
      };
    }

    function createCapPiece({ texture, capRadius, thickness }) {
      function configureCapTexture(texture) {
        texture.offset.set(0.5, 0.5);
        texture.repeat.set(1 / ornamentRadius, 1 / ornamentRadius);
        return texture;
      }

      function createCapShape() {
        const shape = new THREE.Shape();
        shape.absarc(0, 0, capRadius, 0, Math.PI * 2, false);
        return shape;
      }

      function createCapMaterial(texture) {
        return new THREE.MeshStandardMaterial({
          map: configureCapTexture(texture),
          roughness: 0.85,
          metalness: 0.0
        });
      }

      const shape = createCapShape();
      const material = createCapMaterial(texture);
      const mesh = new THREE.Mesh(extrudeShape(shape, thickness), material);

      return { mesh, shape };
    }


    // -------------------------
    // Scene construction helpers
    // -------------------------

    function buildPaperMesh() {
      const paperGeo = new THREE.PlaneGeometry(paperWidth, paperHeight, 1, 1);
      const paperMesh = new THREE.Mesh(paperGeo, paperMat);
      paperMesh.position.set(0, 0.3 * ornamentRadius, 0);
      return paperMesh;
    }

    function setInitialPieceTransforms({
      leftOrnamentPiece,
      rightOrnamentPiece,
      capPiece
    }) {
      leftOrnamentPiece.group.position.copy(leftStartPosition);
      rightOrnamentPiece.group.position.copy(rightStartPosition);
      capPiece.mesh.position.copy(capStartPosition);

      leftOrnamentPiece.group.rotation.set(0, 0, 0);
      rightOrnamentPiece.group.rotation.set(0, 0, 0);
      capPiece.mesh.rotation.set(0, 0, 0);
    }

    function createOutlineGroup({
      leftOrnamentPiece,
      rightOrnamentPiece,
      capPiece
    }) {
      const group = new THREE.Group();
      group.position.set(0, 0, 0);

      const leftCircleOutline = lineFromShape(leftOrnamentPiece.circleShape);
      const leftBumpOutline = lineFromShape(leftOrnamentPiece.bumpShape);
      leftCircleOutline.position.copy(leftStartPosition);
      leftBumpOutline.position.copy(leftStartPosition);

      const rightCircleOutline = lineFromShape(rightOrnamentPiece.circleShape);
      const rightBumpOutline = lineFromShape(rightOrnamentPiece.bumpShape);
      rightCircleOutline.position.copy(rightStartPosition);
      rightBumpOutline.position.copy(rightStartPosition);

      const capOutline = lineFromShape(capPiece.shape);
      capOutline.position.copy(capStartPosition);

      group.add(
        leftCircleOutline,
        leftBumpOutline,
        rightCircleOutline,
        rightBumpOutline,
        capOutline
      );

      return group;
    }

    function createAssemblyGroups() {
      const ornamentAssemblyGroup = new THREE.Group();
      const titleLetterGroup = new THREE.Group();

      ornamentAssemblyGroup.position.copy(ornamentFinalPosition);

      scene.add(ornamentAssemblyGroup);
      scene.add(titleLetterGroup);

      return {
        ornamentAssemblyGroup,
        titleLetterGroup
      };
    }

    // -------------------------
    // Title / letter helpers
    // -------------------------


    function measureLetterWidth(char) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;

      const ctx = canvas.getContext("2d");
      ctx.font = "bold 220px Arial";
      return ctx.measureText(char).width;
    }

    function makeLetterSprite(char) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#f6f6f4";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold 160px Arial";
      ctx.fillText(char, canvas.width / 2, canvas.height / 2 + 8);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.generateMipmaps = false;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        opacity: 0,
      });

      const sprite = new THREE.Sprite(material);
      // sprite.center.set(0, 0.5);
      sprite.scale.set(letterCfg.startScale, letterCfg.startScale, 1);

      return sprite;
    }

    function computeLetterLayout() {
      let cursorX = 0.62;
      let prevGlyphWidth = 1.2 * ornamentRadius;
      const layout = [];

      for (const ch of titleLetters) {
        if (ch === " ") {
          const spaceWidth = measureLetterWidth(" ") * letterCfg.widthScale + letterCfg.wordGapExtra;
          cursorX += prevGlyphWidth / 2;
          cursorX += spaceWidth;
          prevGlyphWidth = spaceWidth;
          continue;
        }

        const glyphWidth = measureLetterWidth(ch) * letterCfg.widthScale;

        cursorX += prevGlyphWidth / 2;
        cursorX += glyphWidth / 2;

        layout.push({
          char: ch,
          glyphWidth,
          targetX: cursorX,
          targetY: letterCfg.baselineY,
          targetZ: letterCfg.finalZ,
          arcHeight: letterCfg.arcHeight,
        });

        cursorX += letterCfg.tracking;
        prevGlyphWidth = glyphWidth;
      }

      return layout;
    }

    function createTitleLetters() {
      letterGroup.clear();

      const layout = computeLetterLayout();

      for (const letterSpec of layout) {
        const sprite = makeLetterSprite(letterSpec.char);
        sprite.userData.glyphWidth = letterSpec.glyphWidth;

        sprite.position.set(
          letterCfg.spawnOffsetX,
          letterCfg.spawnOffsetY,
          letterCfg.spawnOffsetZ
        );
        sprite.userData.targetX = letterSpec.targetX;
        sprite.userData.targetY = letterSpec.targetY;
        sprite.userData.targetZ = letterSpec.targetZ;
        sprite.userData.arcHeight = letterSpec.arcHeight;

        letterGroup.add(sprite);
      }
    }

    // -------------------------
    // Motion path helpers
    // -------------------------

    const leftCurve = new THREE.QuadraticBezierCurve3(leftLiftedPosition.clone(), leftCurveControl.clone(), leftAssemblyApproachPosition.clone());
    const rightCurve = new THREE.QuadraticBezierCurve3(rightLiftedPosition.clone(), rightCurveControl.clone(), rightAssemblyApproachPosition.clone());
    const capCurve = new THREE.QuadraticBezierCurve3(capLiftedPosition.clone(), capCurveControl.clone(), capAssemblyApproachPosition.clone());

    // -------------------------
    // Reparent helper (preserve world transform)
    // -------------------------
    function reparentPreserveWorld(obj, newParent) {
      obj.updateMatrixWorld(true);
      newParent.updateMatrixWorld(true);

      const worldMatrix = obj.matrixWorld.clone();
      const invParentWorld = new THREE.Matrix4().copy(newParent.matrixWorld).invert();

      obj.parent.remove(obj);
      newParent.add(obj);

      const localMatrix = new THREE.Matrix4().multiplyMatrices(invParentWorld, worldMatrix);
      localMatrix.decompose(obj.position, obj.quaternion, obj.scale);
    }


    // -------------------------
    // Timeline helpers
    // -------------------------

    function resetSceneState() {
      leftOrnamentPiece.group.position.copy(leftStartPosition);
      rightOrnamentPiece.group.position.copy(rightStartPosition);
      capPiece.mesh.position.copy(capStartPosition);

      leftOrnamentPiece.group.rotation.set(0, 0, 0);
      rightOrnamentPiece.group.rotation.set(0, 0, 0);
      capPiece.mesh.rotation.set(0, 0, 0);

      assemblyGroup.rotation.set(0, 0, 0);

      paperMesh.position.set(0, 0.3 * ornamentRadius, 0);
      paperMat.opacity = 1;

      titleAnchorPosition.set(0, 0, assemblyZ);
      assemblyGroup.position.copy(ornamentFinalPosition);
      letterGroup.position.copy(titleAnchorPosition);
      outlineGroup.position.set(0, 0, 0);
    }

    function ensureDirectSceneParenting() {
      if (leftOrnamentPiece.group.parent !== scene) reparentPreserveWorld(leftOrnamentPiece.group, scene);
      if (rightOrnamentPiece.group.parent !== scene) reparentPreserveWorld(rightOrnamentPiece.group, scene);
      if (capPiece.mesh.parent !== scene) reparentPreserveWorld(capPiece.mesh, scene);
    }

    function resetOutlineOpacity() {
      outlineMats.forEach((m) => {
        m.opacity = 0;
      });
    }

    function addLetterTweens(tl) {
      letterGroup.children.forEach((sprite, index) => {
        const launchTime = letterCfg.sequenceStart + index * letterCfg.launchDelay;
        const mat = sprite.material;

        tl.call(() => {
          sprite.position.set(
            -titleAnchorPosition.x,
            -titleAnchorPosition.y,
            -titleAnchorPosition.z
          );
          sprite.scale.set(letterCfg.startScale, letterCfg.startScale, 1);
          mat.opacity = 0;
        }, [], launchTime);

        tl.to(sprite.position, {
          x: sprite.userData.targetX,
          z: sprite.userData.targetZ,
          duration: letterCfg.flightDuration,
          ease: "power2.inOut"
        }, launchTime);

        tl.to(sprite.scale, {
          x: letterCfg.finalScale * 1.12,
          y: letterCfg.finalScale * 1.12,
          duration: letterCfg.flightDuration * 0.65,
          ease: "back.out(1.7)"
        }, launchTime);

        tl.to(sprite.scale, {
          x: letterCfg.finalScale,
          y: letterCfg.finalScale,
          duration: letterCfg.flightDuration * 0.35,
          ease: "power2.out"
        }, launchTime + letterCfg.flightDuration * 0.65);

        tl.to(mat, {
          opacity: 1,
          duration: Math.min(0.18, letterCfg.flightDuration * 0.25),
          ease: "power1.out"
        }, launchTime);

        const arcState = { t: 0 };
        tl.to(arcState, {
          t: 1,
          duration: letterCfg.flightDuration,
          ease: "none",
          onUpdate: () => {
            sprite.position.y =
              letterCfg.baselineY +
              Math.sin(arcState.t * Math.PI) * sprite.userData.arcHeight;
          }
        }, launchTime);
      });
    }

    function addOutlineTweens(tl) {
      tl.to(outlineMats, {
        opacity: 1,
        duration: (tB1 - tB0),
        ease: "power1.inOut"
      }, tB0);

      tl.to(outlineMats, {
        opacity: 0.35,
        duration: 0.25,
        ease: "power1.out"
      }, tC1 - 0.10);

      tl.to(outlineMats, {
        opacity: 0,
        duration: 0.4,
        ease: "power1.out"
      }, 5.2);
    }

    function addLiftTweens(tl) {
      tl.to(leftOrnamentPiece.group.position, {
        x: leftLiftedPosition.x,
        y: leftLiftedPosition.y,
        z: leftLiftedPosition.z,
        duration: (tC1 - tC0),
        ease: "power2.out"
      }, tC0);

      tl.to(rightOrnamentPiece.group.position, {
        x: rightLiftedPosition.x,
        y: rightLiftedPosition.y,
        z: rightLiftedPosition.z,
        duration: (tC1 - tC0),
        ease: "power2.out"
      }, tC0);

      tl.to(capPiece.mesh.position, {
        x: capLiftedPosition.x,
        y: capLiftedPosition.y,
        z: capLiftedPosition.z,
        duration: (tC1 - tC0),
        ease: "power2.out"
      }, tC0);
    }

    function addTravelTweens(tl) {
      const leftU = { u: 0 };
      const rightU = { u: 0 };

      tl.to(leftU, {
        u: 1,
        duration: (tD1 - tD0),
        ease: "power2.inOut",
        onUpdate: () => {
          const p = leftCurve.getPoint(leftU.u);
          leftOrnamentPiece.group.position.copy(p);
        }
      }, tD0);

      tl.to(rightU, {
        u: 1,
        duration: (tD1 - tD0),
        ease: "power2.inOut",
        onUpdate: () => {
          const p = rightCurve.getPoint(rightU.u);
          rightOrnamentPiece.group.position.copy(p);
        }
      }, tD0);

      tl.to(leftOrnamentPiece.group.rotation, {
        y: leftYawTotal,
        duration: (tD1 - tD0),
        ease: "power2.inOut"
      }, tD0);

      tl.to(rightOrnamentPiece.group.rotation, {
        y: rightYawTotal,
        duration: (tD1 - tD0),
        ease: "power2.inOut"
      }, tD0);

      tl.to(capPiece.mesh.position, {
        z: -1 * ornamentRadius,
        duration: (tD1 - tD0),
        ease: "power2.inOut"
      }, tD0);

      tl.to(paperMesh.position, {
        z: -10,
        duration: (tD1 - tD0),
        ease: "power2.inOut"
      }, tD0);

      tl.to(paperMat, {
        opacity: 0,
        duration: (tD1 - tD0),
        ease: "power1.inOut"
      }, tD0);
    }

    function addDropAndCapTweens(tl) {
      tl.to(rightOrnamentPiece.group.position, {
        x: ornamentFinalPosition.x,
        y: ornamentFinalPosition.y,
        z: ornamentFinalPosition.z + 0.03,
        duration: (tE1 - tE0),
        ease: "power2.inOut"
      }, tE0);

      tl.to(leftOrnamentPiece.group.position, {
        x: ornamentFinalPosition.x,
        y: ornamentFinalPosition.y,
        z: ornamentFinalPosition.z + 0.00,
        duration: (tE1 - tE0),
        ease: "power2.inOut"
      }, tE0);

      const capU = { u: 0 };
      tl.to(capU, {
        u: 1,
        duration: (tF1 - tF0),
        ease: "power2.inOut",
        onUpdate: () => {
          const p = capCurve.getPoint(capU.u);
          capPiece.mesh.position.copy(p);
        }
      }, tF0);

      tl.to(capPiece.mesh.rotation, {
        x: capPitchTotal,
        duration: (tG1 - tG0),
        ease: "power2.inOut"
      }, tG0);

      tl.to(capPiece.mesh.position, {
        x: capFinalPosition.x,
        y: capFinalPosition.y,
        z: capFinalPosition.z + 0.06,
        duration: (tH1 - tH0),
        ease: "power2.out"
      }, tH0);

      tl.to(leftOrnamentPiece.group.position, {
        x: ornamentFinalPosition.x,
        y: ornamentFinalPosition.y,
        z: ornamentFinalPosition.z + 0.00,
        duration: 0.001
      }, tI0 - 0.001);
    }

    function addAssemblyTweens(tl) {
      tl.call(() => {
        assemblyGroup.position.copy(titleAnchorPosition);
        letterGroup.position.copy(titleAnchorPosition);
        assemblyGroup.rotation.set(0, 0, 0);

        reparentPreserveWorld(leftOrnamentPiece.group, assemblyGroup);
        reparentPreserveWorld(rightOrnamentPiece.group, assemblyGroup);
        reparentPreserveWorld(capPiece.mesh, assemblyGroup);
      }, [], tI0);

      tl.to(titleAnchorPosition, {
        x: -4.0,
        duration: (tI1 - tI0),
        ease: "power2.inOut",
        onUpdate: () => {
          assemblyGroup.position.copy(titleAnchorPosition);
          letterGroup.position.copy(titleAnchorPosition);
          outlineGroup.position.copy(titleAnchorPosition);
        }
      }, tI0);

      tl.to(assemblyGroup.rotation, {
        y: groupYawTotal,
        duration: (tI1 - tI0),
        ease: "power2.inOut"
      }, tI0);
    }

    function addFinalSpinTweens(tl) {
      tl.to(assemblyGroup.rotation, {
        y: 0,
        duration: (tJ1 - tJ0),
        ease: "power2.inOut"
      }, tJ0);

      tl.to(assemblyGroup.rotation, {
        y: 4 * groupYawTotal,
        duration: (tK1 - tK0),
        ease: "linear"
      }, tK0);
    }

    function buildTimeline() {
      if (tl) tl.kill();

      resetSceneState();
      createTitleLetters();
      ensureDirectSceneParenting();
      resetOutlineOpacity();

      tl = gsap.timeline({
        defaults: { overwrite: false },
        duration: 6.0
      });

      addLetterTweens(tl);
      addOutlineTweens(tl);
      addLiftTweens(tl);
      addTravelTweens(tl);
      addDropAndCapTweens(tl);
      addAssemblyTweens(tl);
      addFinalSpinTweens(tl);

      tl.play(0);
    }

    // -------------------------
    // Storyboard
    // -------------------------

    // Scene
    const scene = createScene();
    const renderer = createRenderer();
    // const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    // camera.position.set(0, 0.6, 10);
    const camera = createCamera();

    // Lights
    addSceneLights(scene);

    // Textures
    const ornamentTextureALeft = configureOrnamentTexture(loadTexture("mahoneyCardALeft.png"));
    const ornamentTextureARight = configureOrnamentTexture(loadTexture("mahoneyCardARight.png"));
    const ornamentTextureBLeft = configureOrnamentTexture(loadTexture("mahoneyCardBLeft.png"));
    const ornamentTextureBRight = configureOrnamentTexture(loadTexture("mahoneyCardBRight.png"));
    const capTexture = configureCapTexture(loadTexture("mahoneyCardCap.png"));

    // Materials
    const paperMat = makePaperMaterial();
    const outlineMat = new THREE.LineBasicMaterial({
      color: 0x222222,
      transparent: true,
      opacity: 0.0
    });

    // Paper
    const paperMesh = buildPaperMesh();
    scene.add(paperMesh);

    // Pieces
    const leftOrnamentPiece = createOrnamentPiece({
      frontTexture: ornamentTextureALeft,
      backTexture: ornamentTextureBRight,
      ornamentRadius,
      thickness: paperThickness
    });

    const rightOrnamentPiece = createOrnamentPiece({
      frontTexture: ornamentTextureARight,
      backTexture: ornamentTextureBLeft,
      ornamentRadius,
      thickness: paperThickness
    });

    const capPiece = createCapPiece({
      texture: capTexture,
      capRadius,
      thickness: paperThickness
    });

    setInitialPieceTransforms({
      leftOrnamentPiece,
      rightOrnamentPiece,
      capPiece
    }
    );
    scene.add(leftOrnamentPiece.group, rightOrnamentPiece.group, capPiece.mesh);

    // Outlines
    const outlineGroup = createOutlineGroup({
      leftOrnamentPiece,
      rightOrnamentPiece,
      capPiece
    });
    scene.add(outlineGroup);


    // Collect outline materials for fading
    const outlineMats = outlineGroup.children.map(line => line.material);

    // Groups
    const {
      ornamentAssemblyGroup: assemblyGroup,
      titleLetterGroup: letterGroup
    } = createAssemblyGroups();

    // Debug
    exposeDebugGlobals({
      scene,
      camera,
      assemblyGroup
    });

    // Timeline

    let tl;
    buildTimeline();
    tl.timeScale(0.5);

    // Connect UI

    document.getElementById("restart").addEventListener("click", () => {
      buildTimeline();
    });

    // Render

    function animate() {
      requestAnimationFrame(animate);
      // controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Handle resize

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>

</html>
