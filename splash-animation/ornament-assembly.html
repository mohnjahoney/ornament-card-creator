<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Paper Cutout Assembly (Three.js + GSAP)</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #0b0b0c;
      overflow: hidden;
    }

    #ui {
      position: fixed;
      left: 12px;
      top: 12px;
      color: #ddd;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.3;
    }

    #ui button {
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: #111;
      color: #ddd;
      cursor: pointer;
    }

    #ui button:hover {
      background: #171717;
    }
  </style>
</head>

<body>
  <div id="ui">
    <div><b>Paper Cutout Assembly</b></div>
    <div>Three.js + GSAP • 6.0s timeline</div>
    <button id="restart">Restart</button>
  </div>

  <script type="module">

    // -------------------------
    // Imports
    // -------------------------
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { gsap } from "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm";

    // Import all of these things from the config.
    // Careful with mutable things like Vector3s
    import {
      ornamentRadius,
      capRadius,
      paperWidth,
      paperHeight,
      paperThickness,
      liftHeight,
      assemblyZ,
      ornamentFinalPosition,
      rightAssemblyApproachPosition,
      leftAssemblyApproachPosition,
      capAssemblyApproachPosition,
      capFinalPosition,
      titleAnchorPosition,
      leftStartPosition,
      rightStartPosition,
      capStartPosition,
      leftLiftedPosition,
      rightLiftedPosition,
      capLiftedPosition,
      leftCurveControl,
      rightCurveControl,
      capCurveControl,
      leftYawTotal,
      rightYawTotal,
      capPitchTotal,
      groupYawTotal,
      tA0, tA1,
      tB0, tB1,
      tC0, tC1,
      tD0, tD1,
      tE0, tE1,
      tF0, tF1,
      tG0, tG1,
      tH0, tH1,
      tI0, tI1,
      tJ0, tJ1,
      tK0, tK1,
      titleLetters,
      letterCfg
    } from "./config.js";


    import {
      loadTexture,
      configureOrnamentTexture,
      configureCapTexture,
      extrudeShape,
      createOrnamentPiece,
      createCapPiece
    } from "./ornament-builders.js";

    import {
      createScene,
      createRenderer,
      createCamera,
      addSceneLights,
      exposeDebugGlobals
    } from "./scene-helpers.js";

    import {
      measureLetterWidth,
      makeLetterSprite,
      computeLetterLayout,
      addLettersToGroup,
    } from "./title-helpers.js";

    import {
      resetAndBuildTimeline
    } from "./timeline.js";

    function makePaperMaterial() {
      return new THREE.MeshStandardMaterial({
        color: 0xfaf7f0,
        roughness: 0.9,
        metalness: 0.0,
        transparent: true
      });
    }



    function lineFromShape(shape) {
      const pts = shape.getPoints(128);
      const geo = new THREE.BufferGeometry().setFromPoints(pts.map(p => new THREE.Vector3(p.x, p.y, 0.001)));
      return new THREE.LineLoop(geo, outlineMat.clone());
    }


    // -------------------------
    // Scene construction helpers
    // -------------------------

    function buildPaperMesh() {
      const paperGeo = new THREE.PlaneGeometry(paperWidth, paperHeight, 1, 1);
      const paperMesh = new THREE.Mesh(paperGeo, paperMat);
      paperMesh.position.set(0, 0.3 * ornamentRadius, 0);
      return paperMesh;
    }

    function setInitialPieceTransforms({
      leftOrnamentPiece,
      rightOrnamentPiece,
      capPiece
    }) {
      leftOrnamentPiece.group.position.copy(leftStartPosition);
      rightOrnamentPiece.group.position.copy(rightStartPosition);
      capPiece.mesh.position.copy(capStartPosition);

      leftOrnamentPiece.group.rotation.set(0, 0, 0);
      rightOrnamentPiece.group.rotation.set(0, 0, 0);
      capPiece.mesh.rotation.set(0, 0, 0);
    }

    function createOutlineGroup({
      leftOrnamentPiece,
      rightOrnamentPiece,
      capPiece
    }) {
      const group = new THREE.Group();
      group.position.set(0, 0, 0);

      const leftCircleOutline = lineFromShape(leftOrnamentPiece.circleShape);
      const leftBumpOutline = lineFromShape(leftOrnamentPiece.bumpShape);
      leftCircleOutline.position.copy(leftStartPosition);
      leftBumpOutline.position.copy(leftStartPosition);

      const rightCircleOutline = lineFromShape(rightOrnamentPiece.circleShape);
      const rightBumpOutline = lineFromShape(rightOrnamentPiece.bumpShape);
      rightCircleOutline.position.copy(rightStartPosition);
      rightBumpOutline.position.copy(rightStartPosition);

      const capOutline = lineFromShape(capPiece.shape);
      capOutline.position.copy(capStartPosition);

      group.add(
        leftCircleOutline,
        leftBumpOutline,
        rightCircleOutline,
        rightBumpOutline,
        capOutline
      );

      return group;
    }

    function createAssemblyGroups() {
      const ornamentAssemblyGroup = new THREE.Group();
      const titleLetterGroup = new THREE.Group();

      ornamentAssemblyGroup.position.copy(ornamentFinalPosition);

      scene.add(ornamentAssemblyGroup);
      scene.add(titleLetterGroup);

      return {
        ornamentAssemblyGroup,
        titleLetterGroup
      };
    }


    // -------------------------
    // Motion path helpers
    // -------------------------

    const leftCurve = new THREE.QuadraticBezierCurve3(leftLiftedPosition.clone(), leftCurveControl.clone(), leftAssemblyApproachPosition.clone());
    const rightCurve = new THREE.QuadraticBezierCurve3(rightLiftedPosition.clone(), rightCurveControl.clone(), rightAssemblyApproachPosition.clone());
    const capCurve = new THREE.QuadraticBezierCurve3(capLiftedPosition.clone(), capCurveControl.clone(), capAssemblyApproachPosition.clone());

    // -------------------------
    // Storyboard
    // -------------------------

    // Scene
    const scene = createScene();
    // scene.background = new THREE.Color(0xfaf7f0);
    const renderer = createRenderer();
    // const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    // camera.position.set(0, 0.6, 10);
    const camera = createCamera();

    // Lights
    addSceneLights(scene);

    // Textures
    const ornamentTextureALeft = configureOrnamentTexture(loadTexture("mahoneyCardALeft.png"));
    const ornamentTextureARight = configureOrnamentTexture(loadTexture("mahoneyCardARight.png"));
    const ornamentTextureBLeft = configureOrnamentTexture(loadTexture("mahoneyCardBLeft.png"));
    const ornamentTextureBRight = configureOrnamentTexture(loadTexture("mahoneyCardBRight.png"));
    const capTexture = configureCapTexture(loadTexture("mahoneyCardCap.png"));

    // Materials
    const paperMat = makePaperMaterial();
    const outlineMat = new THREE.LineBasicMaterial({
      color: 0x222222,
      transparent: true,
      opacity: 0.0
    });

    // Paper
    const paperMesh = buildPaperMesh();
    scene.add(paperMesh);

    // Pieces
    const leftOrnamentPiece = createOrnamentPiece({
      frontTexture: ornamentTextureALeft,
      backTexture: ornamentTextureBRight,
      ornamentRadius,
      // thickness: paperThickness
    });

    const rightOrnamentPiece = createOrnamentPiece({
      frontTexture: ornamentTextureARight,
      backTexture: ornamentTextureBLeft,
      ornamentRadius,
      // thickness: paperThickness
    });

    const capPiece = createCapPiece({
      texture: capTexture,
      capRadius,
      ornamentRadius,
      // thickness: paperThickness
    });

    setInitialPieceTransforms({
      leftOrnamentPiece,
      rightOrnamentPiece,
      capPiece
    }
    );
    scene.add(leftOrnamentPiece.group, rightOrnamentPiece.group, capPiece.mesh);

    // Outlines
    const outlineGroup = createOutlineGroup({
      leftOrnamentPiece,
      rightOrnamentPiece,
      capPiece
    });
    scene.add(outlineGroup);


    // Collect outline materials for fading
    const outlineMats = outlineGroup.children.map(line => line.material);

    // Groups
    const {
      ornamentAssemblyGroup: assemblyGroup,
      titleLetterGroup: letterGroup
    } = createAssemblyGroups();

    // Debug
    exposeDebugGlobals({
      scene,
      camera,
      assemblyGroup
    });

    // Timeline
    const tlRef = { current: null };
    const deps = {
      leftOrnamentPiece,
      rightOrnamentPiece,
      capPiece,
      paperMesh,
      paperMat,
      assemblyGroup,
      letterGroup,
      outlineGroup,
      outlineMats,
      scene,
      leftCurve,
      rightCurve,
      capCurve,
      titleAnchorPosition,
      addLettersToGroup,
      tlRef,
    };
    let tl = resetAndBuildTimeline(deps);
    tl.timeScale(0.5);

    // Connect UI

    document.getElementById("restart").addEventListener("click", () => {
      tl = resetAndBuildTimeline(deps);
      tl.timeScale(0.5);
    });

    // Render

    function animate() {
      requestAnimationFrame(animate);
      // controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Handle resize

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>

</html>
